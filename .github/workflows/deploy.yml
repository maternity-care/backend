# =============================================================================
# CI/CD — Build Docker image, push to GHCR, deploy to VPS via SSH
# =============================================================================
# Trigger: push to main, or run manually from Actions tab.
#
# Required GitHub repository secrets (Settings -> Secrets and variables -> Actions):
#   SSH_HOST          - VPS IP or hostname (e.g. 1.2.3.4)
#   SSH_USER          - SSH username (e.g. deploy, ubuntu)
#   SSH_PRIVATE_KEY   - Private SSH key (paste full content, including BEGIN/END lines)
#   SSH_PORT          - (optional) SSH port, defaults to 22
#   DEPLOY_PATH       - Absolute path on VPS where compose file lives (e.g. /opt/maternity/backend)
#
# Prerequisites:
#   - The GHCR package (ghcr.io/maternity-care/backend) MUST be set to PUBLIC
#     so the VPS can pull without credentials. After the first successful push,
#     go to https://github.com/orgs/maternity-care/packages -> backend ->
#     Package settings -> Change visibility -> Public.
#   - The VPS must already have: Docker, Docker Compose plugin, the external
#     network `maternity_care_system_g44` (created by the infrastructure stack),
#     and a `.env` file in DEPLOY_PATH.
# =============================================================================

name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint "{src,test}/**/*.ts" --max-warnings=0
        continue-on-error: true

      - name: Build (verify TypeScript compiles)
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (need compose file)
        uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: docker-compose.prod.yml
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Pull image and restart container on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
