# =============================================================================
# CI/CD Pipeline — Maternity Care Backend
# =============================================================================
# Flow:
#   1. Push code lên nhánh main (hoặc bấm Run workflow thủ công)
#   2. GitHub Actions build Docker image và push lên GHCR (ghcr.io)
#   3. SSH vào VPS, pull image mới và restart container
#
# GitHub Secrets cần thiết (Settings > Secrets and variables > Actions):
#   SERVER_HOST       IP hoặc hostname VPS         (vd: 1.2.3.4)
#   SERVER_USER       User SSH                     (vd: root)
#   SERVER_SSH_KEY    Private SSH key (paste cả khối BEGIN/END)
#
# Yêu cầu trên VPS (làm 1 lần):
#   - Cài Docker + Docker Compose plugin
#   - Tạo network: docker network create maternity_care_system_g44
#   - Tạo thư mục /opt/maternity/backend và đặt file .env trong đó
#   - Sau lần build đầu, set GHCR package visibility = Public
#     (https://github.com/orgs/maternity-care/packages)
# =============================================================================

name: CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DEPLOY_PATH: /opt/maternity/backend

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build TypeScript, build Docker image, push lên GHCR
  # ---------------------------------------------------------------------------
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript (verify compile)
        run: npm run build

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Job 2: SSH vào VPS, pull image mới, restart container
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (cần file docker-compose.prod.yml)
        uses: actions/checkout@v4

      - name: Copy compose file lên VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: docker-compose.prod.yml
          target: ${{ env.DEPLOY_PATH }}

      - name: Pull image mới và restart container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ${{ env.DEPLOY_PATH }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
